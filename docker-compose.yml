services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: challenge_bot
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d challenge_bot"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  bot:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/challenge_bot
      BOT_TOKEN: ${BOT_TOKEN}
      ADMIN_IDS: ${ADMIN_IDS}
      CHANNEL_ID: ${CHANNEL_ID}
      CHANNEL_LINK: ${CHANNEL_LINK}
      BOT_USERNAME: ${BOT_USERNAME}
      BOT_MODE: ${BOT_MODE:-polling}
      PORT: ${PORT:-3000}
      NODE_ENV: production
      # Webhook settings — only needed when BOT_MODE=webhook
      WEBHOOK_DOMAIN: ${WEBHOOK_DOMAIN:-}
      WEBHOOK_PATH: ${WEBHOOK_PATH:-/webhook}
      WEBHOOK_SECRET_TOKEN: ${WEBHOOK_SECRET_TOKEN:-}
    restart: unless-stopped

volumes:
  postgres_data:
